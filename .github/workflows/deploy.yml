name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  RG: career-net-rg
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Hangi servisler değişti? ──────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway:          ${{ steps.filter.outputs.api-gateway }}
      job-service:          ${{ steps.filter.outputs.job-service }}
      search-service:       ${{ steps.filter.outputs.search-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      admin-service:        ${{ steps.filter.outputs.admin-service }}
      ai-agent-service:     ${{ steps.filter.outputs.ai-agent-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            job-service:
              - 'services/job-service/**'
            search-service:
              - 'services/search-service/**'
            notification-service:
              - 'services/notification-service/**'
            admin-service:
              - 'services/admin-service/**'
            ai-agent-service:
              - 'services/ai-agent-service/**'

  # ── Ortak: GHCR'ye build+push + Container App güncelle ───────────────────────

  deploy-api-gateway:
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-api-gateway:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/api-gateway
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-api-gateway:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-api-gateway:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name api-gateway \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-api-gateway:latest

  deploy-job-service:
    needs: changes
    if: needs.changes.outputs.job-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-job-service:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/job-service
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-job-service:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-job-service:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name job-service \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-job-service:latest

  deploy-search-service:
    needs: changes
    if: needs.changes.outputs.search-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-search-service:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/search-service
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-search-service:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-search-service:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name search-service \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-search-service:latest

  deploy-notification-service:
    needs: changes
    if: needs.changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-notification-service:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/notification-service
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-notification-service:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-notification-service:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name notification-service \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-notification-service:latest

  deploy-admin-service:
    needs: changes
    if: needs.changes.outputs.admin-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-admin-service:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/admin-service
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-admin-service:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-admin-service:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name admin-service \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-admin-service:latest

  deploy-ai-agent-service:
    needs: changes
    if: needs.changes.outputs.ai-agent-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        run: |
          IMAGE=${{ env.IMAGE_PREFIX }}/career-net-ai-agent-service:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE services/ai-agent-service
          docker push $IMAGE
          docker tag $IMAGE ${{ env.IMAGE_PREFIX }}/career-net-ai-agent-service:latest
          docker push ${{ env.IMAGE_PREFIX }}/career-net-ai-agent-service:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update Container App
        run: |
          az containerapp update \
            --name ai-agent-service \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE_PREFIX }}/career-net-ai-agent-service:latest
