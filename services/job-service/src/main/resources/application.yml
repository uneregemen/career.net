server:
  port: 8081

spring:
  application:
    name: job-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      # rediss:// (çift s) = SSL/TLS — Upstash için zorunlu
      url: ${REDIS_URL}

  rabbitmq:
    # amqps:// prefix'i Spring Boot'a SSL kullan demektir (CloudAMQP için gerekli)
    addresses: ${RABBITMQ_URL}

  cache:
    type: redis
    redis:
      time-to-live: 3600000   # 1 hour default TTL

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${AWS_REGION:us-east-1}.amazonaws.com/${COGNITO_USER_POOL_ID:local}/.well-known/jwks.json

rabbitmq:
  queue:
    job-created: ${RABBITMQ_QUEUE_JOB_CREATED:job.created}

cache:
  ttl:
    job: 3600        # seconds
    city-jobs: 900   # 15 min
    search: 600      # 10 min
