server:
  port: 8081

spring:
  application:
    name: job-service

  jackson:
    serialization:
      write-dates-as-timestamps: false  # LocalDateTime'ı ISO string olarak serialize et

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      # rediss:// (çift s) = SSL/TLS — Upstash için zorunlu
      url: ${REDIS_URL}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST}
    ssl:
      enabled: true

  cache:
    type: redis
    redis:
      time-to-live: 3600000   # 1 hour default TTL

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${AWS_REGION:us-east-1}.amazonaws.com/${COGNITO_USER_POOL_ID:local}/.well-known/jwks.json

rabbitmq:
  queue:
    job-created: ${RABBITMQ_QUEUE_JOB_CREATED:job.created}

cache:
  ttl:
    job: 3600        # seconds
    city-jobs: 900   # 15 min
    search: 600      # 10 min
