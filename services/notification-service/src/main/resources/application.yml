server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://db.mqjvwjqtbwknugtfogal.supabase.co:5432/postgres
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://careeruser:careerpass@localhost:27017/careerdb?authSource=admin}
      database: ${MONGO_DATABASE:careerdb}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:careeruser}
    password: ${RABBITMQ_PASSWORD:careerpass}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://cognito-idp.${AWS_REGION:us-east-1}.amazonaws.com/${COGNITO_USER_POOL_ID:local}/.well-known/jwks.json

rabbitmq:
  queue:
    job-created: ${RABBITMQ_QUEUE_JOB_CREATED:job.created}

scheduler:
  related-jobs-lookback-days: 7
